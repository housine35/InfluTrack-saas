name: influtrack-saas-prod

services:
  mongo:
    image: mongo:7
    container_name: influtrack-mongo-prod
    restart: unless-stopped
    command: ["--bind_ip_all", "--quiet"]
    volumes:
      - mongo_data:/data/db
    networks:
      - backend
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./services/api
      dockerfile: Dockerfile
    container_name: influtrack-api-prod
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    env_file:
      - ./services/api/.env
    environment:
      MONGODB_URI: mongodb://mongo:27017
      CORS_ORIGINS: ${CORS_ORIGINS:-https://app.example.com}
      PASSWORD_RESET_URL_BASE: ${PASSWORD_RESET_URL_BASE:-https://app.example.com/reset-password}
      PASSWORD_RESET_DEBUG_RETURN_TOKEN: "false"
      TIKTOK_SCRAPER_CHROME_BIN: /usr/bin/chromium
    expose:
      - "8000"
    networks:
      - backend
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).read()\"",
        ]
      interval: 15s
      timeout: 5s
      retries: 8

  web:
    build:
      context: .
      dockerfile: ./apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-/api}
    container_name: influtrack-web-prod
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-/api}
    expose:
      - "3000"
    networks:
      - frontend
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3000').then((r)=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))\"",
        ]
      interval: 20s
      timeout: 6s
      retries: 8

  proxy:
    image: nginx:1.27-alpine
    container_name: influtrack-proxy-prod
    restart: unless-stopped
    depends_on:
      web:
        condition: service_healthy
      api:
        condition: service_healthy
    volumes:
      - ./infra/nginx/prod.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"
    networks:
      - frontend
      - backend
    security_opt:
      - no-new-privileges:true

networks:
  frontend:
  backend:
    internal: true

volumes:
  mongo_data:
